services:
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loadtest
    hostname: loadtest
    restart: unless-stopped
    volumes:
      - ./config:/app/config
    ports:
      - "8080:8080"
  redis:
    image: redis:8.0-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    hostname: redis
    container_name: redis
